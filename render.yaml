services:
  - type: web
    name: competitor-analysis-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OAUTH_SERVER_URL
        value: https://dummy.example.com
      - key: JWT_SECRET
        generateValue: true
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
